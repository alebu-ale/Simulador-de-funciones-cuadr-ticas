<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Cuadrática</title>
    
    <!-- Librerías necesarias -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 50px; padding: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #resultados { margin-top: 20px; background: #f4f4f4; padding: 15px; }
    </style>
</head>
<body>

    <h2>Calculadora de Funciones Cuadráticas</h2>
    <div class="box">
        <label>a: <input type="number" id="a" value="1"></label>
        <label>b: <input type="number" id="b" value="-3"></label>
        <label>c: <input type="number" id="c" value="2"></label>
        <br><br>
        <button onclick="resolver()">Resolver Ejercicio</button>
    </div>

    <div id="resultados">
        <h3>Procedimiento:</h3>
        <div id="pasos">Introduce los valores y presiona el botón.</div>
    </div>

    <script>
        function resolver() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const contenedor = document.getElementById('pasos');

            let disc = (b * b) - (4 * a * c);
            
            let html = `Sustituyendo: $$x = \\frac{-(${b}) \\pm \\sqrt{(${b})^2 - 4(${a})(${c})}}{2(${a})}$$`;
            html += `<br>Discriminante: $$\\Delta = ${b*b} - ${4*a*c} = ${disc}$$`;

            if (disc >= 0) {
                let x1 = (-b + Math.sqrt(disc)) / (2 * a);
                let x2 = (-b - Math.sqrt(disc)) / (2 * a);
                html += `<br>Soluciones: $$x_1 = ${x1.toFixed(2)}, \\quad x_2 = ${x2.toFixed(2)}$$`;
            } else {
                html += `<br>El discriminante es negativo, no hay soluciones reales.`;
            }

            contenedor.innerHTML = html;
            // Esto hace que KaTeX pinte las fórmulas
            renderMathInElement(contenedor, {delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}]});
        }
    </script>
</body>
</html>
