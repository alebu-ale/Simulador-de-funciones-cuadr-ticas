<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolución Completa - Universidad</title>
    
    <!-- Librerías KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        body { font-family: sans-serif; padding: 15px; line-height: 1.6; background-color: #f8fafc; color: #1e293b; }
        .card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; background: white; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .inputs { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .field { display: flex; flex-direction: column; align-items: center; width: 30%; font-weight: bold; }
        input { width: 100%; padding: 8px; text-align: center; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; font-size: 16px; cursor: pointer; }
        #resultados { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .step { margin-bottom: 25px; padding: 12px; background: #fafafa; border-left: 4px solid #2563eb; border-radius: 4px; }
        .step-title { font-weight: bold; color: #2563eb; margin-bottom: 8px; display: block; font-size: 16px; }
        ul { padding-left: 20px; margin: 10px 0; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Resolución Paso a Paso Avanzada</h2>
    
    <div class="card">
        <div class="inputs">
            <div class="field"><label>a</label><input type="number" id="a" value="1"></div>
            <div class="field"><label>b</label><input type="number" id="b" value="-3"></div>
            <div class="field"><label>c</label><input type="number" id="c" value="2"></div>
        </div>
        <button onclick="desarrollarEjercicio()">Desarrollar Ejercicio</button>
    </div>

    <div id="resultados">
        <h3 style="margin-top:0;">Desarrollo Matemático Completo:</h3>
        <div id="pasos">Introduce los coeficientes numéricos y presiona el botón para ver todo el desglose analítico.</div>
    </div>

    <script>
        function desarrollarEjercicio() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const contenedor = document.getElementById('pasos');

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                contenedor.innerHTML = "Por favor, ingresa los tres coeficientes.";
                return;
            }
            if (a === 0) {
                contenedor.innerHTML = "El coeficiente 'a' no puede ser cero.";
                return;
            }

            let html = "";

            // PASO 1: MODELO TEÓRICO
            html += `<div class="step">
                <span class="step-title">Paso 1: Estructura Analítica General</span>
                <p>Toda ecuación de segundo grado responde a la forma estándar:</p>
                $$ax^2 + bx + c = 0$$
                <p>La ecuación cuadrática se resuelve utilizando la fórmula general:</p>
                $$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$
            </div>`;

            // PASO 2: ASIGNACIÓN DE CONSTANTES
            let signoB = b >= 0 ? "+ " + b : b;
            let signoC = c >= 0 ? "+ " + c : c;
            html += `<div class="step">
                <span class="step-title">Paso 2: Identificación de Valores</span>
                <p>Para la ecuación propuesta $$ ${a}x^2 ${signoB}x ${signoC} = 0 $$, extraemos los valores de los coeficientes:</p>
                $$a = ${a}, \\quad b = ${b}, \\quad c = ${c}$$
            </div>`;

            // PASO 3: SUSTITUCIÓN TEXTUAL
            html += `<div class="step">
                <span class="step-title">Paso 3: Sustitución de Valores en la Fórmula</span>
                <p>Reemplazamos explícitamente cada variable por su respectivo valor numérico dentro de paréntesis:</p>
                $$x = \\frac{-(${b}) \\pm \\sqrt{(${b})^2 - 4(${a})(${c})}}{2(${a})}$$
            </div>`;

            // VALORES ARITMÉTICOS
            let bCuadrado = b * b;
            let productoAC = 4 * a * c;
            let discriminante = bCuadrado - productoAC;
            let menosB = -b;
            let dosA = 2 * a;

            // PASO 4: OPERACIONES INTERMEDIAS
            html += `<div class="step">
                <span class="step-title">Paso 4: Resolución de Operaciones Aritméticas</span>
                <p>Calculamos individualmente cada parte de la estructura:</p>
                <ul>
                    <li>Signo del término lineal: $-(${b}) = ${menosB}$</li>
                    <li>Potencia del término lineal: (${b})^2 = ${bCuadrado}$</li>
                    <li>Producto del radicando: $4 \\cdot (${a}) \\cdot (${c}) = ${productoAC}$</li>
                    <li>Denominador común: $2 \\cdot (${a}) = ${dosA}$</li>
                </ul>
                <p>Sustituyendo estos bloques resueltos, la fracción principal se reduce a:</p>
                $$x = \\frac{${menosB} \\pm \\sqrt{${bCuadrado} - ${productoAC}}}{${dosA}}$$
                <p>Efectuamos la resta dentro del radical para obtener el Discriminante ($\\Delta$):</p>
                $$x = \\frac{${menosB} \\pm \\sqrt{${discriminante}}}{${dosA}}$$
            </div>`;

            // PASO 5: BIFURCACIÓN DE ACUERDO AL DISCRIMINANTE
            html += `<div class="step">
                <span class="step-title">Paso 5: Análisis del Radical y Desglose de Soluciones</span>`;

            if (discriminante > 0) {
                let raiz = Math.sqrt(discriminante);
                let numX1 = menosB + raiz;
                let numX2 = menosB - raiz;
                let x1 = numX1 / dosA;
                let x2 = numX2 / dosA;

                html += `<p>El discriminante es positivo ($\\Delta = ${discriminante}$), indicando que existen dos soluciones reales distintas. Evaluamos la raíz:</p>
                $$\\sqrt{${discriminante}} = ${raiz}$$
                <p>Sustituimos la raíz en la expresión general:</p>
                $$x = \\frac{${menosB} \\pm ${raiz}}{${dosA}}$$
                <p>Separamos los caminos algebraicos empleando los signos del numerador:</p>
                
                <p><strong>Desarrollo para $x_1$ (Ruta Suma $+$):</strong></p>
                $$x_1 = \\frac{${menosB} + ${raiz}}{${dosA}}$$
                $$x_1 = \\frac{${numX1}}{${dosA}}$$
                $$x_1 = ${x1.toFixed(2)}$$
                
                <p><strong>Desarrollo para $x_2$ (Ruta Resta $-$):</strong></p>
                $$x_2 = \\frac{${menosB} - ${raiz}}{${dosA}}$$
                $$x_2 = \\frac{${numX2}}{${dosA}}$$
                $$x_2 = ${x2.toFixed(2)}$$
                
                <p><strong>Conjunto Solución Final:</strong></p>
                $$S = \\{ ${x1.toFixed(2)}, \\, ${x2.toFixed(2)} \\}$$`;

            } else if (discriminante === 0) {
                let x = menosB / dosA;
                html += `<p>El discriminante es igual a cero ($\\Delta = 0$), reduciendo el radicando a cero y generando soluciones reales repetidas:</p>
                $$x = \\frac{${menosB} \\pm 0}{${dosA}}$$
                $$x = \\frac{${menosB}}{${dosA}}$$
                $$x = ${x.toFixed(2)}$$
                <p><strong>Conjunto Solución Final:</strong></p>
                $$S = \\{ ${x.toFixed(2)} \\}$$`;
            } else {
                // AQUÍ SOLO CORRE SI EL DISCRIMINANTE ES NEGATIVO
                let discPositivo = -discriminante;
                let raizCompleja = Math.sqrt(discPositivo);
                let parteReal = menosB / dosA;
                let parteImaginaria = raizCompleja / dosA;

                html += `<p>El discriminante es negativo ($\\Delta = ${discriminante}$), lo que significa que no existen soluciones reales. Aplicamos la propiedad fundamental de los números imaginarios donde $\\sqrt{-1} = i$:</p>
                $$\\sqrt{${discriminante}} = \\sqrt{${discPositivo} \\cdot (-1)} = \\sqrt{${discPositivo}} \\cdot i = ${raizCompleja.toFixed(2)}i$$
                <p>Reescribimos la ecuación sustituyendo el valor imaginario obtenido:</p>
                $$x = \\frac{${menosB} \\pm ${raizCompleja.toFixed(2)}i}{${dosA}}$$
                <p>Distribuimos el denominador común ($${dosA}$) para separar de forma explícita la parte real y la parte imaginaria:</p>
                $$x = \\frac{${menosB}}{${dosA}} \\pm \\frac{${raizCompleja.toFixed(2)}i}{${dosA}}$$
                
                <p><strong>Soluciones Complejas Conjugadas:</strong></p>
                $$x_1 = ${parteReal.toFixed(2)} + ${parteImaginaria.toFixed(2)}i$$
                $$x_2 = ${parteReal.toFixed(2)} - ${parteImaginaria.toFixed(2)}i$$
                
                <p><strong>Conjunto Solución Complejo:</strong></p>
                $$S = \\{ ${parteReal.toFixed(2)} \\pm ${parteImaginaria.toFixed(2)}i \\}$$`;
            }

            html += `</div>`;
            contenedor.innerHTML = html;

            // Renderizar todo con KaTeX de forma segura
            renderMathInElement(contenedor, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ],
                throwOnError: false
            });
        }
    </script>
</body>
</html>
